  <!-- Open Graph -->
  <meta property="og:title" content="Yukitsune .corp — Portfolio Template">

  <meta name="twitter:image:alt" content="Yukitsune .corp — Portfolio Template">

  <!-- JSON-LD Structured Data (Schema.org — Person) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Yukitsune .corp",
    "alternateName": "YK",
    "url": "https://yukitsune.corp",
    "image": "https://yukitsune.corp/assets/images/profile/avatar.svg",
    "jobTitle": "Portfolio Template",
    "description": "A modern, accessible, and performant portfolio template built with vanilla HTML, CSS, and JavaScript.",
    "sameAs": [
      "https://github.com/Yukitsune",
      "https://linkedin.com/company/yukitsune",
      "https://x.com/yukitsune",
      "https://codepen.io/yukitsune",
      "https://dev.to/yukitsune",
      "https://medium.com/@yukitsune"
    ],
    "knowsAbout": ["Design Systems", "HTML5", "CSS3", "JavaScript ES6+", "Web Accessibility", "React", "Vue", "Performance Optimization"],
    "worksFor": {
      "@type": "Organization",
      "name": "Yukitsune .corp",
      "url": "https://yukitsune.corp"
    },
    "alumniOf": [
      {
        "@type": "CollegeOrUniversity",
        "name": "University of Technology",
        "url": "https://www.tech-university.example.com"
      },
      {
        "@type": "EducationalOrganization",
        "name": "Professional Certificate",

      }

  }

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Stylesheet — single entry point -->
  <link rel="stylesheet" href="css/main.css">

  <!-- Preload fonts (uncomment when fonts are available)
  <link rel="preload" href="/assets/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin>
  -->
</head>
<body>

  <!-- Skip Navigation — Accessibility -->
  <a class="u-sr-only u-sr-only--focusable" href="#main-content">Skip to main content</a>

  <!-- ─────────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────────── -->
  <header id="site-header" role="banner">
    <div class="l-header__inner" id="header-inner">
      <!-- Logo (rendered by JS) -->
      <div class="c-logo" id="site-logo"></div>

      <!-- Navigation (rendered by JS) -->
      <nav id="primary-navigation" aria-label="Primary navigation">
        <div id="nav-content"></div>
      </nav>

      <!-- Mobile menu toggle (rendered by JS) -->
      <button id="nav-toggle"
              class="c-nav-toggle"
              aria-label="Toggle navigation menu"
              aria-expanded="false"
              aria-controls="primary-navigation">
      </button>
    </div>
  </header>

  <!-- ─────────────────────────────────────────────────
       MAIN CONTENT
       ───────────────────────────────────────────────── -->
  <main id="main-content" role="main">
    <!--
      Sections rendered dynamically from data.js.
      Each <section> is an empty container — JS fills it.
    -->

    <section id="section-hero"
             data-section="hero"
             aria-label="Hero">
      <div class="l-section" id="hero-container"></div>
    </section>

    <section id="section-about"
             data-section="about"
             aria-labelledby="about-heading">
      <div class="l-section" id="about-container"></div>
    </section>

    <section id="section-skills"
             data-section="skills"
             aria-labelledby="skills-heading">
      <div class="l-section" id="skills-container"></div>
    </section>

    <section id="section-experience"
             data-section="experience"
             aria-labelledby="experience-heading">
      <div class="l-section" id="experience-container"></div>
    </section>

    <section id="section-projects"
             data-section="projects"
             aria-labelledby="projects-heading">
      <div class="l-section" id="projects-container"></div>
    </section>

    <section id="section-achievements"
             data-section="achievements"
             aria-labelledby="achievements-heading">
      <div class="l-section" id="achievements-container"></div>
    </section>

    <section id="section-education"
             data-section="education"
             aria-labelledby="education-heading">
      <div class="l-section" id="education-container"></div>
    </section>

    <section id="section-certificates"
             data-section="certificates"
             aria-labelledby="certificates-heading">
      <div class="l-section" id="certificates-container"></div>
    </section>

    <section id="section-contact"
             data-section="contact"
             aria-labelledby="contact-heading">
      <div class="l-section" id="contact-container"></div>
    </section>

    <section id="section-social"
             data-section="social"
             aria-labelledby="social-heading">
      <div class="l-section" id="social-container"></div>
    </section>
  </main>

  <!-- ─────────────────────────────────────────────────
       FOOTER
       ───────────────────────────────────────────────── -->
  <footer id="site-footer" role="contentinfo">
    <div class="l-footer__inner" id="footer-inner">
      <!-- Copyright (rendered by JS) -->
      <div id="footer-copyright"></div>

      <!-- Footer links (rendered by JS) -->
      <div id="footer-links"></div>
    </div>
  </footer>

  <!-- ─────────────────────────────────────────────────
       SCRIPTS
       ───────────────────────────────────────────────── -->
  <!-- data.js — Single Source of Truth (global portfolioData) -->
  <script src="data.js"></script>

  <!-- js/main.js — Application entry point (ES Module) -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
